<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../global/style/global.css" />
    <script src="../components/index.ts" type="module"></script>
  </head>

  <body>
    <set-theme></set-theme>
    <lsby-set-debug 排除事件="mousemove,mouseenter,mouseleave,scroll"></lsby-set-debug>
    <lsby-set-html-full></lsby-set-html-full>
    <lsby-login-check></lsby-login-check>

    <lsby-tabs-horizontal 路由键="tab">
      <div
        标签="web测试"
        style="
          display: flex;
          flex-direction: column;
          justify-content: space-around;
          align-items: center;
          width: 100%;
          height: 100%;
        "
      >
        <div
          style="
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            gap: 10px;
            width: 100%;
          "
        >
          <div
            style="
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              overflow: hidden;
              flex: 1;
            "
          >
            todo测试
            <lsby-todo-list-demo></lsby-todo-list-demo>
          </div>
        </div>
        <div
          style="
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            gap: 10px;
            width: 100%;
          "
        >
          <div
            style="
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              overflow: hidden;
              flex: 1;
            "
          >
            加法测试
            <lsby-add-demo a="1" b="2"></lsby-add-demo>
          </div>
          <div
            style="
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              overflow: hidden;
              flex: 1;
            "
          >
            ws测试
            <lsby-ws-demo></lsby-ws-demo>
          </div>
          <div
            style="
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              overflow: hidden;
              flex: 1;
            "
          >
            路由测试
            <lsby-route>
              <div
                style="
                  display: flex;
                  flex-direction: column;
                  justify-content: center;
                  align-items: center;
                  overflow: hidden;
                  width: 100%;
                  height: 100%;
                "
              >
                <lsby-ping-demo></lsby-ping-demo>
                <lsby-pong-demo></lsby-pong-demo>
              </div>
            </lsby-route>
          </div>
        </div>
      </div>
      <div
        标签="表格测试"
        style="
          display: flex;
          flex-direction: column;
          justify-content: space-around;
          align-items: center;
          width: 100%;
          height: 100%;
        "
      >
        <div
          style="
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex: 1;
          "
        >
          表格测试
          <lsby-user-management-demo></lsby-user-management-demo>
        </div>
      </div>
      <div 标签="提示框测试">
        <div
          style="
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            align-items: center;
            gap: 10px;
            width: 100%;
          "
        >
          <div
            style="
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              overflow: hidden;
              flex: 1;
            "
          >
            <lsby-toast-demo></lsby-toast-demo>
          </div>
          <div
            style="
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              overflow: hidden;
              flex: 1;
            "
          >
            <lsby-dialog-demo></lsby-dialog-demo>
          </div>
        </div>
      </div>
      <div 标签="capacitor测试">
        <lsby-capacitor-demo></lsby-capacitor-demo>
      </div>
      <div 标签="electron测试">
        <lsby-electron-demo></lsby-electron-demo>
      </div>
      <div 标签="文件上传测试">
        <lsby-file-upload-demo></lsby-file-upload-demo>
      </div>
    </lsby-tabs-horizontal>
  </body>
</html>
