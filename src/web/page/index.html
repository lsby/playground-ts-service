<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../global/style/global.css" />
    <script src="../components/index.ts" type="module"></script>
  </head>

  <body>
    <set-theme></set-theme>
    <lsby-set-debug 排除事件="mousemove,mouseenter,mouseleave,scroll"></lsby-set-debug>
    <lsby-set-html-full></lsby-set-html-full>
    <lsby-login-check></lsby-login-check>

    <lsby-tabs-horizontal>
      <div
        标签="开始"
        style="
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          overflow: hidden;
          width: 100%;
          height: 100%;
        "
      >
        <div>你好世界</div>
      </div>
      <div
        标签="演示"
        style="
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          overflow: hidden;
          width: 100%;
          height: 100%;
        "
      >
        <lsby-to-demo></lsby-to-demo>
      </div>
      <div
        标签="系统"
        style="
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          overflow: hidden;
          width: 100%;
          height: 100%;
        "
      >
        <lsby-tabs-vertical>
          <div
            标签="设置"
            style="
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              overflow: hidden;
              width: 100%;
              height: 100%;
            "
          >
            <lsby-settings></lsby-settings>
          </div>
          <div
            标签="用户"
            style="
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              overflow: hidden;
              width: 100%;
              height: 100%;
            "
          >
            <lsby-user-profile></lsby-user-profile>
          </div>
          <div
            标签="关于"
            style="
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              overflow: hidden;
              width: 100%;
              height: 100%;
            "
          >
            <lsby-app-version></lsby-app-version>
          </div>
        </lsby-tabs-vertical>
      </div>
    </lsby-tabs-horizontal>
    <management-float></management-float>
  </body>
</html>
